<!DOCTYPE html>
<html>
<head>
  <title>JebatClaw</title>
</head>
<body>
  <h1>JebatClaw Properties</h1>

  <div id="list"></div>

  <script>
    fetch("https://jebatclaw-backend.onrender.com/properties")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("list");

        data.forEach(p => {
          const div = document.createElement("div");
          div.innerHTML = `
            <h3>${p.title}</h3>
            <p>${p.location}</p>
            <p>RM ${p.price}</p>
            ${p.image_url ? `<img src="${p.image_url}" width="200"/>` : ""}
          `;
          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
