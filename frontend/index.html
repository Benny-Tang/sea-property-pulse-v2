<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEA Property Pulse — Live Market Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0D1B3E; color: #fff; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #0D1B3E, #028090);
      padding: 24px 40px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(2,195,154,0.3);
    }
    header h1 { font-size: 24px; color: #02C39A; }
    header p { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .live-badge {
      background: rgba(2,195,154,0.2); border: 1px solid #02C39A;
      color: #02C39A; padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }

    .stats-bar {
      display: flex; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .stat-item {
      flex: 1; padding: 20px; text-align: center;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .stat-item .val { font-size: 28px; font-weight: 700; color: #02C39A; }
    .stat-item .lbl { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

    .filters {
      display: flex; gap: 10px; padding: 20px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
      background: transparent; color: rgba(255,255,255,0.6);
      cursor: pointer; font-size: 13px; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #02C39A; color: #02C39A; }
    .filter-btn.active { background: rgba(2,195,154,0.2); border-color: #02C39A; color: #02C39A; font-weight: 600; }
    .filter-btn.buyer { border-color: #60A5FA; color: #60A5FA; }
    .filter-btn.buyer.active { background: rgba(96,165,250,0.2); }
    .filter-btn.seller { border-color: #F87171; color: #F87171; }
    .filter-btn.seller.active { background: rgba(248,113,113,0.2); }
    .filter-btn.momentum { border-color: #34D399; color: #34D399; }
    .filter-btn.momentum.active { background: rgba(52,211,153,0.2); }

    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px; padding: 24px 40px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 20px;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-2px); border-color: rgba(2,195,154,0.3); }
    .card.buyer_intent { border-left: 3px solid #60A5FA; }
    .card.seller_stress { border-left: 3px solid #F87171; }
    .card.momentum { border-left: 3px solid #34D399; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .signal-badge {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; padding: 3px 10px; border-radius: 10px;
    }
    .signal-badge.buyer_intent { background: rgba(96,165,250,0.2); color: #60A5FA; }
    .signal-badge.seller_stress { background: rgba(248,113,113,0.2); color: #F87171; }
    .signal-badge.momentum { background: rgba(52,211,153,0.2); color: #34D399; }

    .country-tag { font-size: 12px; color: rgba(255,255,255,0.4); }

    .card-title {
      font-size: 14px; font-weight: 600; color: #fff;
      margin-bottom: 8px; line-height: 1.4;
    }
    .card-snippet { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.5; margin-bottom: 10px; }

    .card-meta { display: flex; gap: 10px; flex-wrap: wrap; }
    .meta-item { font-size: 11px; color: rgba(255,255,255,0.35); }
    .meta-item span { color: #02C39A; }

    .card-link {
      display: inline-block; margin-top: 10px;
      font-size: 11px; color: #028090; text-decoration: none;
    }
    .card-link:hover { color: #02C39A; }

    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 400px; gap: 16px;
    }
    .spinner {
      width: 48px; height: 48px; border: 3px solid rgba(2,195,154,0.2);
      border-top-color: #02C39A; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-data { text-align: center; padding: 60px; color: rgba(255,255,255,0.3); }

    footer {
      text-align: center; padding: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 12px; color: rgba(255,255,255,0.25);
    }
    footer span { color: #02C39A; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏙️ SEA Property Pulse</h1>
    <p>AI-Powered Real Estate Market Intelligence · Southeast Asia</p>
  </div>
  <div class="live-badge">🟢 LIVE DATA</div>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="val" id="totalListings">—</div><div class="lbl">Total Signals</div></div>
  <div class="stat-item"><div class="val" id="buyerCount">—</div><div class="lbl">Buyer Intent</div></div>
  <div class="stat-item"><div class="val" id="sellerCount">—</div><div class="lbl">Seller Stress</div></div>
  <div class="stat-item"><div class="val" id="momentumCount">—</div><div class="lbl">Momentum</div></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterAll()">🌏 All Markets</button>
  <button class="filter-btn" onclick="filterCountry('MY')">🇲🇾 Malaysia</button>
  <button class="filter-btn" onclick="filterCountry('SG')">🇸🇬 Singapore</button>
  <button class="filter-btn" onclick="filterCountry('TH')">🇹🇭 Thailand</button>
  <button class="filter-btn" onclick="filterCountry('ID')">🇮🇩 Indonesia</button>
  <button class="filter-btn" onclick="filterCountry('PH')">🇵🇭 Philippines</button>
  <button class="filter-btn" onclick="filterCountry('VN')">🇻🇳 Vietnam</button>
  <button class="filter-btn buyer" onclick="filterSignal('buyer_intent')">🔵 Buyer Intent</button>
  <button class="filter-btn seller" onclick="filterSignal('seller_stress')">🔴 Seller Stress</button>
  <button class="filter-btn momentum" onclick="filterSignal('momentum')">🟢 Momentum</button>
</div>

<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <p style="color:rgba(255,255,255,0.4)">Loading live market signals...</p>
  </div>
</div>

<footer>
  Powered by <span>Bright Data</span> · <span>Claude AI</span> · <span>Supabase</span> · Built by Benny Tang
</footer>

<script>
  const API_URL = window.location.hostname === 'localhost'
    ? 'http://localhost:3000/api'
    : '/api';

  let allListings = [];
  let activeCountry = null;
  let activeSignal = null;

  const flags = { MY:'🇲🇾', SG:'🇸🇬', TH:'🇹🇭', ID:'🇮🇩', PH:'🇵🇭', VN:'🇻🇳' };

  async function loadListings() {
    try {
      const res = await fetch(`${API_URL}/listings`);
      if (!res.ok) throw new Error('API error');
      allListings = await res.json();
      updateStats();
      renderCards(allListings);
    } catch (err) {
      document.getElementById('content').innerHTML =
        '<div class="no-data"><h2 style="color:#F87171">No Data Yet</h2><p>Run the scraper to populate signals.</p></div>';
    }
  }

  function updateStats() {
    document.getElementById('totalListings').textContent = allListings.length;
    document.getElementById('buyerCount').textContent = allListings.filter(l => l.signal_type === 'buyer_intent').length;
    document.getElementById('sellerCount').textContent = allListings.filter(l => l.signal_type === 'seller_stress').length;
    document.getElementById('momentumCount').textContent = allListings.filter(l => l.signal_type === 'momentum').length;
  }

  function renderCards(listings) {
    if (!listings.length) {
      document.getElementById('content').innerHTML = '<div class="no-data">No signals match this filter.</div>';
      return;
    }
    const cards = listings.map(l => `
      <div class="card ${l.signal_type}">
        <div class="card-top">
          <span class="signal-badge ${l.signal_type}">${l.signal_type?.replace('_', ' ') || 'unknown'}</span>
          <span class="country-tag">${flags[l.country_code] || ''} ${l.country}</span>
        </div>
        <div class="card-title">${l.title || 'No title'}</div>
        <div class="card-snippet">${l.snippet || ''}</div>
        <div class="card-meta">
          ${l.location ? `<div class="meta-item">📍 <span>${l.location}</span></div>` : ''}
          ${l.price ? `<div class="meta-item">💰 <span>${l.price}</span></div>` : ''}
          ${l.source ? `<div class="meta-item">🌐 <span>${l.source}</span></div>` : ''}
        </div>
        ${l.url ? `<a class="card-link" href="${l.url}" target="_blank">View listing →</a>` : ''}
      </div>
    `).join('');
    document.getElementById('content').innerHTML = `<div class="grid">${cards}</div>`;
  }

  function filterAll() {
    activeCountry = null; activeSignal = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderCards(allListings);
  }

  function filterCountry(code) {
    activeCountry = code; activeSignal = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderCards(allListings.filter(l => l.country_code === code));
  }

  function filterSignal(type) {
    activeSignal = type; activeCountry = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderCards(allListings.filter(l => l.signal_type === type));
  }

  loadListings();
  setInterval(loadListings, 5 * 60 * 1000);
</script>
</body>
</html>
